<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康就是氣血水 · 健康諮詢申請</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#1c4a35;--forest-mid:#2d6b4a;--forest-pale:#eef5f0;
  --gold:#c4943a;--cream:#fdf9f3;--white:#fff;
  --text:#1a1a1a;--muted:#888;--border:#e8e4dc;
  --shadow:0 4px 24px rgba(28,74,53,.08);--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* ── Hero ── */
.hero{
  background:linear-gradient(150deg,#1c4a35 0%,#2d6b4a 55%,#1a3d2b 100%);
  padding:4rem 1.5rem 7rem;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;width:500px;height:500px;
  background:radial-gradient(circle,rgba(196,148,58,.18) 0%,transparent 65%);
  top:-150px;right:-100px;border-radius:50%;pointer-events:none;
}
.hero::after{
  content:'';position:absolute;width:350px;height:350px;
  background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 65%);
  bottom:60px;left:-60px;border-radius:50%;pointer-events:none;
}
.hero-dots{
  display:flex;justify-content:center;gap:5px;margin-bottom:1.75rem;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);
}
.hero-dot.active{background:var(--gold);width:18px;border-radius:3px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:99px;padding:6px 16px;font-size:11px;
  color:rgba(255,255,255,.75);letter-spacing:.12em;margin-bottom:1.5rem;
  backdrop-filter:blur(8px);
}
.hero-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,9vw,58px);font-weight:300;
  color:#fff;letter-spacing:.14em;margin-bottom:.4rem;
  animation:fadeUp .9s ease both;
}
.hero-brand span{color:var(--gold);}
.hero-en{
  font-size:11px;color:rgba(255,255,255,.45);
  letter-spacing:.28em;text-transform:uppercase;
  margin-bottom:1.75rem;animation:fadeUp .9s .1s ease both;
}
.hero-tagline{
  font-size:clamp(18px,4.5vw,24px);font-weight:700;
  color:#fff;margin-bottom:.75rem;
  animation:fadeUp .9s .2s ease both;
}
.hero-desc{
  font-size:14px;color:rgba(255,255,255,.65);line-height:1.9;
  max-width:300px;margin:0 auto;animation:fadeUp .9s .3s ease both;
}
.hero-wave{position:absolute;bottom:-1px;left:0;right:0;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(22px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Feature pills ── */
.hero-features{
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
  margin-top:1.5rem;animation:fadeUp .9s .4s ease both;
}
.feat-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:99px;padding:5px 12px;font-size:11px;color:rgba(255,255,255,.7);
}

/* ── Form wrap ── */
.form-wrap{max-width:580px;margin:0 auto;padding:2rem 1rem 5rem;}

/* ── Section cards ── */
.sec{
  background:var(--white);border-radius:var(--r);padding:1.5rem;
  margin-bottom:.875rem;box-shadow:var(--shadow);
  border:1px solid rgba(232,228,220,.5);
  animation:fadeUp .7s ease both;
}
.sec:nth-child(1){animation-delay:.05s;}
.sec:nth-child(2){animation-delay:.12s;}
.sec:nth-child(3){animation-delay:.19s;}
.sec:nth-child(4){animation-delay:.26s;}
.sec:nth-child(5){animation-delay:.33s;}

.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.sec-icon{
  width:34px;height:34px;border-radius:9px;
  background:var(--forest-pale);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.sec-title{font-size:14px;font-weight:700;color:var(--forest);}
.sec-opt{
  font-size:10px;color:var(--muted);background:#f5f4f0;
  padding:2px 8px;border-radius:99px;margin-left:7px;font-weight:400;
}

/* ── Fields ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.02em;}
.req{color:#c0392b;margin-left:2px;}
.field input,.field select,.field textarea{
  height:46px;border:1.5px solid var(--border);border-radius:10px;
  padding:0 14px;font-size:14px;font-family:'Noto Sans TC',sans-serif;
  background:#fafaf8;color:var(--text);width:100%;transition:all .2s;
}
.field textarea{height:88px;padding:12px 14px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--forest);background:#fff;
  box-shadow:0 0 0 3px rgba(28,74,53,.08);
}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-hint{font-size:11px;color:#bbb;margin-top:-6px;padding-left:2px;}

/* ── Choice grid ── */
.choice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.choice-item{
  display:flex;align-items:center;gap:9px;padding:11px 13px;
  background:#f9f8f6;border-radius:10px;border:1.5px solid transparent;
  cursor:pointer;transition:all .15s;user-select:none;
}
.choice-item:hover{background:var(--forest-pale);border-color:rgba(28,74,53,.2);}
.choice-item.selected{background:var(--forest-pale);border-color:var(--forest);}
.choice-ck{
  width:18px;height:18px;border:2px solid #ccc;border-radius:5px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;transition:all .15s;
}
.choice-item.selected .choice-ck{background:var(--forest);border-color:var(--forest);}
.choice-label{font-size:13px;color:#333;line-height:1.3;}

/* ── Time pills ── */
.time-row{display:flex;gap:8px;flex-wrap:wrap;}
.time-pill{
  padding:10px 22px;border-radius:99px;font-size:13px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--border);background:#f9f8f6;
  color:#666;font-family:'Noto Sans TC',sans-serif;transition:all .15s;user-select:none;
}
.time-pill:hover{border-color:var(--forest);color:var(--forest);}
.time-pill.selected{border-color:var(--forest);background:var(--forest);color:#fff;}

/* ── Submit area ── */
.submit-area{
  background:var(--white);border-radius:var(--r);padding:1.5rem;
  box-shadow:var(--shadow);border:1px solid rgba(232,228,220,.5);
  animation:fadeUp .7s .4s ease both;
}
.submit-btn{
  width:100%;height:54px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--forest) 0%,var(--forest-mid) 100%);
  color:#fff;font-size:16px;font-weight:700;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;
  transition:all .2s;letter-spacing:.04em;position:relative;overflow:hidden;
}
.submit-btn:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(28,74,53,.3);
}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.trust-row{display:flex;justify-content:center;gap:18px;margin-top:.875rem;flex-wrap:wrap;}
.trust-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}

/* ── Alert ── */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert.error{background:#fff0f0;color:#c0392b;border:1px solid #f5c6cb;}

.sdiv{height:1px;background:#f0ede8;margin:12px 0;}
.other-wrap{margin-top:8px;}

/* ── Thanks ── */
#thanks-screen{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:2rem 1rem;background:var(--cream);
}
.thanks-inner{text-align:center;max-width:380px;width:100%;}
.thanks-circle{
  width:84px;height:84px;border-radius:50%;margin:0 auto 1.5rem;
  background:linear-gradient(135deg,var(--forest),var(--forest-mid));
  display:flex;align-items:center;justify-content:center;
  font-size:36px;color:#fff;
  box-shadow:0 10px 36px rgba(28,74,53,.28);
  animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{
  from{transform:scale(0);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.thanks-title{font-size:22px;font-weight:700;margin-bottom:.5rem;animation:fadeUp .5s .35s ease both;}
.thanks-sub{font-size:14px;color:var(--muted);line-height:1.8;animation:fadeUp .5s .45s ease both;}
.thanks-note{font-size:11px;color:#ccc;margin-top:5px;}
.thanks-card{
  background:var(--white);border:1px solid var(--border);border-radius:14px;
  padding:1.25rem 1.5rem;margin-top:1.5rem;box-shadow:var(--shadow);
  animation:fadeUp .5s .55s ease both;
}
.thanks-card-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;}
.thanks-card-val{font-size:16px;font-weight:700;color:var(--forest);}

@media(max-width:480px){
  .choice-grid{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
  .hero{padding:3rem 1.25rem 6rem;}
}
</style>
</head>
<body>

<!-- ════ FORM SCREEN ════ -->
<div id="form-screen">

  <div class="hero">
    <div class="hero-dots">
      <div class="hero-dot"></div>
      <div class="hero-dot active"></div>
      <div class="hero-dot"></div>
    </div>
    <div class="hero-badge">🌿 &nbsp;HEALTH WELLNESS</div>
    <div class="hero-brand">健康就是<span>氣血水</span></div>
    <div class="hero-en">Health &amp; Wellness</div>
    <div class="hero-tagline">健康諮詢申請</div>
    <div class="hero-desc">讓我們了解您的需求<br>由您的健康顧問為您提供<br>最適合的建議與方案</div>
    <div class="hero-features">
      <div class="feat-pill">🔒 資料安全保護</div>
      
      <div class="feat-pill">💚 專人一對一服務</div>
    </div>
    <svg class="hero-wave" viewBox="0 0 1440 72" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,36 C480,72 960,0 1440,36 L1440,72 L0,72 Z" fill="#fdf9f3"/>
    </svg>
  </div>

  <div class="form-wrap">

    <!-- 基本資料 -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon">👤</div>
        <div class="sec-title">基本資料</div>
      </div>
      <div class="field">
        <label>選擇您的健康顧問 <span class="req">*</span></label>
        <select id="i-dealer"><option value="">載入中…</option></select>
      </div>
      <div class="field">
        <label>您的姓名 <span class="req">*</span></label>
        <input type="text" id="i-name" placeholder="請輸入您的姓名">
      </div>
      <div class="field-row">
        <div class="field">
          <label>聯絡電話</label>
          <input type="tel" id="i-phone" placeholder="09xx-xxx-xxx">
        </div>
        <div class="field">
          <label>LINE ID</label>
          <input type="text" id="i-line" placeholder="輸入 LINE ID">
        </div>
      </div>
      <div class="field-hint">📌 電話或 LINE 請至少填寫一項</div>
    </div>

    <!-- 健康關注 -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon">💚</div>
        <div class="sec-title">您的健康關注<span class="sec-opt">可複選</span></div>
      </div>
      <div class="choice-grid" id="concerns-grid"></div>
      <div class="other-wrap" id="concern-other-wrap" style="display:none">
        <div class="sdiv"></div>
        <div class="field">
          <label>其他健康關注（請說明）</label>
          <input type="text" id="i-concern-other" placeholder="請輸入">
        </div>
      </div>
    </div>

    <!-- 想了解的項目 -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon">✨</div>
        <div class="sec-title">想了解的項目<span class="sec-opt">可複選</span></div>
      </div>
      <div class="choice-grid" id="products-grid"></div>
      <div class="other-wrap" id="product-other-wrap" style="display:none">
        <div class="sdiv"></div>
        <div class="field">
          <label>其他（請說明）</label>
          <input type="text" id="i-product-other" placeholder="請輸入">
        </div>
      </div>
    </div>

    <!-- 聯絡時間 -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon">🕐</div>
        <div class="sec-title">方便聯絡時間<span class="sec-opt">可複選</span></div>
      </div>
      <div class="time-row">
        <div class="time-pill" onclick="toggleTime(this,'早上')">🌅 早上</div>
        <div class="time-pill" onclick="toggleTime(this,'下午')">☀️ 下午</div>
        <div class="time-pill" onclick="toggleTime(this,'晚上')">🌙 晚上</div>
        <div class="time-pill" onclick="toggleTime(this,'假日')">🗓 假日</div>
      </div>
    </div>

    <!-- 備註 -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon">📝</div>
        <div class="sec-title">其他想說的<span class="sec-opt">選填</span></div>
      </div>
      <div class="field">
        <textarea id="i-notes" placeholder="有任何想提前說明的，都可以寫在這裡…"></textarea>
      </div>
    </div>

    <!-- Submit -->
    <div class="submit-area">
      <div id="form-alert"></div>
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">送出諮詢申請</button>
      <div class="trust-row">
        <div class="trust-item">🔒 資料安全保護</div>
        
        <div class="trust-item">💚 專人服務</div>
      </div>
    </div>

  </div>
</div>

<!-- ════ THANKS SCREEN ════ -->
<div id="thanks-screen" style="display:none">
  <div class="thanks-inner">
    <div class="thanks-circle">✓</div>
    <div class="thanks-title">感謝您完成填寫</div>
    <div class="thanks-sub">
      我們會由專人與您聯絡<br>請保持電話或 LINE 暢通
      
    </div>
    <div class="thanks-card">
      <div class="thanks-card-lbl">您的健康顧問</div>
      <div class="thanks-card-val" id="thanks-dealer">—</div>
    </div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbwmXGGtjzdnYJ8Ahj-cShxLXJe00kzHuXGIjSUzQgPTY5-V4BBonirusQkbMi07ZI60/exec';
const CONCERNS=['睡眠','精神體力','排便代謝','疼痛不適','體重管理','壓力疲勞','慢性調養需求','家人健康','價格疑慮','產品安全疑問','不知道是否適合長期使用','其他'];
const PRODUCTS=['想了解的產品','想了解活動','想要健康諮詢','想上專業課程','其他'];

let dealers=[],selConcerns=new Set(),selProducts=new Set(),selTimes=new Set();

async function api(data){
  const res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});
  return res.json();
}

async function init(){
  try{
    const d=await api({action:'getConfig'});
    dealers=d.dealers||[];
    const sel=document.getElementById('i-dealer');
    sel.innerHTML='<option value="">— 選擇您的健康顧問 —</option>';
    dealers.forEach(d=>{
      const o=document.createElement('option');
      o.value=d.id; o.textContent=d.name+(d.team?' · '+d.team:'');
      sel.appendChild(o);
    });
    buildGrid('concerns-grid',CONCERNS,'c',selConcerns,'concern-other-wrap');
    buildGrid('products-grid',PRODUCTS,'p',selProducts,'product-other-wrap');
  }catch(e){showErr('無法連接伺服器，請稍後再試');}
}

function buildGrid(gridId,items,pfx,selSet,otherId){
  document.getElementById(gridId).innerHTML=items.map((item,i)=>
    `<div class="choice-item" id="${pfx}${i}" onclick="toggle('${item.replace(/'/g,"\\'")}',${i},'${pfx}','${otherId}')">
      <div class="choice-ck" id="${pfx}k${i}"></div>
      <div class="choice-label">${item}</div>
    </div>`
  ).join('');
}

function toggle(item,i,pfx,otherId){
  const sel=pfx==='c'?selConcerns:selProducts;
  const el=document.getElementById(pfx+i),ck=document.getElementById(pfx+'k'+i);
  if(sel.has(item)){sel.delete(item);el.classList.remove('selected');ck.textContent='';}
  else{sel.add(item);el.classList.add('selected');ck.textContent='✓';}
  document.getElementById(otherId).style.display=sel.has('其他')?'block':'none';
}

function toggleTime(el,val){
  if(selTimes.has(val)){selTimes.delete(val);el.classList.remove('selected');}
  else{selTimes.add(val);el.classList.add('selected');}
}

async function submitForm(){
  const did=document.getElementById('i-dealer').value;
  const cname=document.getElementById('i-name').value.trim();
  const phone=document.getElementById('i-phone').value.trim();
  const line=document.getElementById('i-line').value.trim();
  if(!did){showErr('請選擇您的健康顧問');return;}
  if(!cname){showErr('請輸入您的姓名');return;}
  if(!phone&&!line){showErr('請至少填寫電話或 LINE 其中一項');return;}
  const dealer=dealers.find(d=>d.id===did);
  const products=[...selProducts];
  const po=document.getElementById('i-product-other').value.trim();
  if(products.includes('其他')&&po) products[products.indexOf('其他')]='其他：'+po;
  const concerns=[...selConcerns];
  const co=document.getElementById('i-concern-other').value.trim();
  if(concerns.includes('其他')&&co) concerns[concerns.indexOf('其他')]='其他：'+co;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='送出中…';
  try{
    const res=await api({
      action:'submitInquiry',did,dname:dealer.name,team:dealer.team||'',cname,
      contact_phone:phone,contact_line:line,health_concerns:concerns,health_other:co,
      inquiry_products:products,contact_time:[...selTimes].join('、'),
      notes:document.getElementById('i-notes').value,
    });
    if(res.ok){
      document.getElementById('thanks-dealer').textContent=dealer.name+(dealer.team?' · '+dealer.team:'');
      document.getElementById('form-screen').style.display='none';
      document.getElementById('thanks-screen').style.display='flex';
      window.scrollTo(0,0);
    }else{showErr(res.error||'送出失敗，請再試一次');btn.disabled=false;btn.textContent='送出諮詢申請';}
  }catch(e){showErr('連線失敗，請稍後再試');btn.disabled=false;btn.textContent='送出諮詢申請';}
}

function showErr(msg){
  const el=document.getElementById('form-alert');
  el.innerHTML=`<div class="alert error">${msg}</div>`;
  el.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(()=>el.innerHTML='',5000);
}

init();
</script>
</body>
</html>
